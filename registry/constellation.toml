# --- Cross-repo contracts ------------------------------------------------------
# Telemetry export (OTLP -> Jaeger on AM4) is carried by [telemetry] below, not
# enrolled as a contract: its consumer is a service (Jaeger), not a repo.

[[contracts]]
name = "hearth-mcp-door"
producer_repo = "commandcenter"
consumer_repos = ["comfy", "windtunnel", "writing", "steppeintegrations-site"]
scope = "cross-repo"
stability = "stable"
notes = "MCP door :8710; mcp__hearth__* tools; files= packing for any repo under C:\\work via multi-root HEARTH_SCOPE"

[[contracts]]
name = "conductor-inbox-brief"
producer_repo = "commandcenter"
consumer_repos = ["commandcenter"]
scope = "intra-repo-cross-machine"
stability = "stable"
notes = "submit_task (gateway, OMEN) writes inbox/<plan_id>.md with CCMETA builder-pin header; conductor serve loop (cc-conductor VM) consumes. Both ends are commandcenter code — enrolled because it is a real wire contract"

[[contracts]]
name = "oxen-openai-facade"
producer_repo = "vllama"
consumer_repos = ["commandcenter"]
scope = "cross-repo"
stability = "stable"
notes = "/v1 on :8090; am4-oxen backend rung + wake_am4 serve-truth + cc-builder-2 runner"

[[contracts]]
name = "finetuned-gguf-handoff"
producer_repo = "xpu-train"
consumer_repos = ["denning"]
scope = "cross-repo"
stability = "experimental"
notes = "first declared cross-repo contract, inherited from the GAD manifest (declared 2026-06-22)"

[telemetry]
otel_collector_endpoint = "http://192.168.12.233:4317"
otel_protocol = "grpc"
service_name_prefix = "mechnet"
sensitive_data_in_spans = false
# exporters today: commandcenter (+ comfy fieldlab); Jaeger UI at 192.168.12.233:16686

[registries]
machines = "fleet/inventory.toml"
model_backends = "hearth/etc/backends.toml"
software = "registry/constellation.toml"

