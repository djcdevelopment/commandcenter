# mechnet Software Constellation Registry
#
# commandcenter's authoritative SOFTWARE registry: the logical organs and
# cross-repo contracts of the "mechnet" constellation.
#
# The Two-Registry Doctrine (ADR-0017):
#   1. Machines / reachability      -> fleet/inventory.toml
#   2. Model backends / rungs       -> hearth/etc/backends.toml
#   3. Software organs + contracts  -> THIS FILE
# Do not duplicate physical facts or backend allocations here. No double-truth.
#
# Schema inherited from constellation-manifest (AM4 seed intake 2026-07-16,
# ADR-0017; exemplar: registry/seed/constellation-gad-2026-06-22.yaml).
# Hand-enrolled v0.1; conformance "reduced" = vocab adapted to mechnet,
# unverified fields omitted rather than guessed (honest-placeholder invariant).

[meta]
schema_version = 1
name = "mechnet"
description = "Derek's hybrid compute fleet + the software organs commandcenter conducts"
archetype = "engine"
topology = "centered"          # commandcenter is the centerpiece; other repos rotate around it
conformance = "reduced"
enrolled = "2026-07-16"
enrolled_by = "claude (AM4 seed intake)"

