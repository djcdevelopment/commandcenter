# HEARTH capability profiles (ADR-0019) — POLICY, checked into git.
#
# This file answers "which roles exist and what may each do". It is deliberately
# version-controlled and readable: authorization policy should be auditable and
# reviewable in a diff. Only the key registry (hearth/var/callers.json) is secret.
#
# The indirection is:  caller -> profile -> capability set -> tool routing
#
# A caller is NOT denied because of what product it is; it is GRANTED a role.
# Adding an integration should be a caller record pointing at an existing
# profile, not a new special case in the gateway.
#
# The tool -> capability TAXONOMY lives in code (hearth/kernel/capabilities.py,
# TOOL_CAPABILITY), next to the TOOL_CLASS precedent in the gateway. That split
# is intentional: the taxonomy must stay exhaustive against the actually-mounted
# tool surface (a startup check and a test enforce it), while the policy below
# is meant to be edited by a human deciding who gets what.
#
# FAIL-CLOSED RULES (all are startup errors, never warnings):
#   - unknown `inherits` parent
#   - inheritance cycle
#   - capability name not in the taxonomy
#   - duplicate profile declaration (tomllib rejects duplicate keys outright)
#   - a tool mounted with no TOOL_CAPABILITY entry
#
# A profile declaring `capabilities = []` is a REAL profile that grants nothing.
# As of ADR-0023 that is also what a caller with NO `profile` field gets: the
# absent field no longer means "everything", it means DENIED. Authority is
# granted by naming a role, never by omitting one.
#
# INTENT IS PART OF THE POLICY. Each role below states what the identity it
# describes EXISTS TO DO, not merely which tools it has been observed calling.
# Grants drift; intent is the thing that tells a future reader whether a drift
# is a correction or a mistake. When you add a role, write its purpose first and
# derive the capability list from that sentence.

# --- research -----------------------------------------------------------------
# The Research Agent: reads, queries, and reasons. Open Notebook authenticates
# as this. It can investigate a repository credibly -- including working-tree
# state and history -- but cannot mutate anything, dispatch fleet work, or reach
# the key registry / fleet inventory (that last one is enforced by the caller's
# `scope`, not by this list; see ADR-0019 §4).
[profile.research]
capabilities = [
    # --- filesystem authority (bounded by the caller's file_scope) ---
    "read",           # read_file, list_dir, glob_files
    # --- gateway authority (capability gate only) ---
    "query",          # the query_* family (read-only belief/capacity/catalog reads)
    "generate",       # local_generate
    "status",         # kernel_status
    # --- repository authority (bounded by the caller's repo_access) ---
    "repo_metadata",  # git_status, git_log -- branch, changed paths, commit
                      # sha/author/date/subject. Repository FACTS with no file
                      # contents, which is what makes them safe to grant next to
                      # a narrowed file_scope.
    #
    # NOT granted: "repo_content" (git_diff). It materializes the contents of
    # any changed file in the repo, including files this profile's file_scope
    # denies -- a laundering path between two authority domains. The loader
    # REFUSES the combination (see auth.py _assert_authority_coherence) rather
    # than leaving it to whoever edits this file to notice. Grant it only to a
    # profile whose file_scope already covers the repositories it can reach.
]

# --- generation-proxy ---------------------------------------------------------
# A component that ONLY relays inference through the door and holds no other
# authority: it reads nothing, writes nothing, dispatches nothing. The Open
# Notebook OpenAI-compatible facade is the first of these -- it calls exactly
# one tool, local_generate, so granting it the research role would hand it
# twelve tools it never invokes.
#
# Deliberately NOT a sub-role of research. A proxy is not an investigator: it
# has no filesystem or repository authority at all, so file_scope/repo_access
# are meaningless for it and should be omitted from its caller record. If Open
# Notebook later speaks MCP directly to inspect sources, THAT caller is a
# separate identity carrying `research` -- one component, one identity, one role.
[profile.generation-proxy]
capabilities = [
    "generate",   # local_generate -- the whole job
    "status",     # kernel_status -- so the proxy can report door reachability
                  # without conflating it with backend health (ADR-0020)
]

# --- probe ---------------------------------------------------------------------
# PURPOSE: confirm the door is alive, and nothing else.
#
# This exists for the checked-in default registry (hearth/etc/callers.json),
# whose secret is public by construction — it is in git. Before ADR-0023 that
# caller had no profile and therefore the full 47-tool surface, so anyone who
# started the gateway without an explicit --callers was one known string away
# from the whole lab. It now holds exactly one capability.
#
# If a test needs more than liveness, it should mint its own fixture caller in a
# temp registry rather than widen this role.
[profile.probe]
capabilities = [
    "status",   # kernel_status — is the door up
]

# --- builder ------------------------------------------------------------------
# DEFINED BUT UNASSIGNED in v1. No caller carries this profile yet; it is the
# documented growth path so the next integration is a config entry rather than
# another security review. Adds the ability to queue fleet work and run tests.
# Note that dispatch still holds NO fleet credential of its own -- submit_task
# runs over the gateway host's SSH identity and is ledgered (ADR-0019 §5).
[profile.builder]
inherits = "research"
capabilities = [
    "dispatch",       # submit_task, task_status, submit_batch
    "test",           # run_tests, lint_digest
    "write",          # write_file
    "repo_content",   # git_diff
    "repo_write",     # git_commit_push
]
# NOTE: because this profile holds repo_content, any caller assigned it must
# EITHER declare no file_scope (full HEARTH_SCOPE) or declare one that covers
# every repository in its repo_access. The loader enforces that; a builder
# narrowed to a subtree while able to diff a wider repo is refused at startup.

# --- orchestrator -------------------------------------------------------------
# DEFINED BUT UNASSIGNED in v1. Fleet-shaping reach: queue inspection, scheduler
# advice, run harvesting.
[profile.orchestrator]
inherits = "builder"
capabilities = [
    "queue",      # queue_status
    "schedule",   # propose_schedule, schedule_hindsight
    "harvest",    # harvest_fleet_run, list_fleet_runs
]

# --- operator -----------------------------------------------------------------
# PURPOSE: a human working the lab by hand from a terminal. Runs experiments,
# drives the fleet, closes receipts, wakes hardware, rebuilds projections --
# every kind of WORK, and deliberately not the one thing that is not work:
# changing the door itself.
#
# The single withheld capability is `kernel_admin` (kernel_change). That is the
# boundary this role encodes: an operator acts THROUGH the gateway, it does not
# reconfigure the gateway mid-flight. Anything that mutates the boundary is a
# deliberate, separately-authorized act, not a convenience available to whatever
# terminal happens to hold this key.
#
# Currently UNASSIGNED — no caller carries this profile. dev-local (Derek's
# hands-on local key) holds `probe` — a status-only liveness key — in the
# deployed registry (hearth/var/callers.json; verify with `callerctl list`).
[profile.operator]
inherits = "orchestrator"
capabilities = [
    "build_request",    # create/get/list/update/execute/close_build_request
    "catalog_write",    # gather_am4_catalog
    "commander",        # refine_idea, refine_result
    "dream",            # dream
    "health",           # masters_pet, patrol
    "knowledge_write",  # project*, rebuild_knowledge, record_event
    "summon",           # checkpoint_vm, start_ollama, wake_am4
]

# --- unrestricted -------------------------------------------------------------
# PURPOSE: the frontier operator/architect identity -- the agent that designs,
# implements, commits, dispatches, closes receipts, and administers the door.
# It holds every capability in the taxonomy, on purpose.
#
# This role exists so that "holds everything" is a DECLARED, reviewable fact
# rather than the accident of an empty field. Before ADR-0023 three callers had
# the full surface because nobody had said otherwise; that is the thing being
# fixed. Breadth is not the defect -- silence was.
#
# Assigned to: claude-frontier.
# GRANTED: 2026-07-20.  REVIEW BY: 2026-10-20.
# At review, check the ledger's per-caller capability usage (now attributable,
# because every event carries `profile`) and decide whether this identity has
# earned a narrower role or genuinely still needs the whole surface.
#
# The list is written out rather than wildcarded so that widening the taxonomy
# cannot silently widen this role. `test_profiles_v1` asserts it stays complete,
# so a new capability fails a test instead of surprising the operator in prod.
[profile.unrestricted]
capabilities = [
    "build_request", "catalog_write", "commander", "dispatch", "dream",
    "generate", "harvest", "health", "kernel_admin", "knowledge_write",
    "query", "queue", "read", "repo_content", "repo_metadata", "repo_write",
    "schedule", "status", "summon", "test", "write",
]
