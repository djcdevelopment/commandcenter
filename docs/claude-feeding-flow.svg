<svg viewBox="0 0 1460 1000" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1460" height="1000" fill="#fafaf9"/>

  <!-- Title -->
  <text x="30" y="34" font-size="21" font-weight="700" fill="#1e293b">The Claude feeding flow — how a prompt becomes a process inside a VM</text>
  <text x="30" y="54" font-size="12.5" fill="#64748b">commandcenter · verified live 2026-07-09 · every machine lane rides mshome.net or the LAN — no tailnet, no browser auth (ADR-0014)</text>

  <!-- step 7 top corridor -->
  <polyline points="820,365 925,365 925,68 280,68 280,268" fill="none" stroke="#64748b" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrd)"/>
  <text x="800" y="62" font-size="11" font-style="italic" fill="#64748b">⑦ result.json → task_status (SSH read) → caller · ledgered</text>

  <!-- ============ OMEN container ============ -->
  <rect x="30" y="80" width="880" height="840" rx="10" fill="#fff8ef" stroke="#d97706" stroke-width="1.6"/>
  <text x="48" y="106" font-size="14" font-weight="700" fill="#92400e">OMEN · Win11 · Hyper-V host</text>

  <!-- intent -->
  <rect x="60" y="130" width="200" height="80" rx="6" fill="#ffffff" stroke="#d97706"/>
  <text x="70" y="152" font-size="13" font-weight="600" fill="#1e293b">Claude session / Derek</text>
  <text x="70" y="170" font-size="11.5" fill="#475569">intent: a brief, a research</text>
  <text x="70" y="186" font-size="11.5" fill="#475569">question, a build slice</text>

  <!-- HEARTH -->
  <rect x="60" y="270" width="240" height="120" rx="6" fill="#ffedd5" stroke="#c2410c"/>
  <text x="70" y="292" font-size="13" font-weight="600" fill="#1e293b">HEARTH gateway :8710</text>
  <text x="70" y="310" font-size="11.5" fill="#475569">submit_task · task_status</text>
  <text x="70" y="326" font-size="11.5" fill="#475569">single door — every offload</text>
  <text x="70" y="342" font-size="11.5" fill="#475569">ledgered, feeds the learning loop</text>
  <text x="70" y="362" font-size="11" font-style="italic" fill="#92400e">plan_id prefixed "hearth-"</text>

  <!-- Ollama -->
  <rect x="60" y="770" width="240" height="90" rx="6" fill="#ffffff" stroke="#d97706"/>
  <text x="70" y="792" font-size="13" font-weight="600" fill="#1e293b">Ollama :11434</text>
  <text x="70" y="810" font-size="11.5" fill="#475569">qwen3-coder:30b · 54 tok/s</text>
  <text x="70" y="826" font-size="11.5" fill="#475569">dial: omen.mshome.net</text>

  <!-- ============ Hyper-V region ============ -->
  <rect x="330" y="112" width="550" height="778" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="7 5"/>
  <text x="348" y="134" font-size="13" font-weight="700" fill="#475569">Hyper-V Default Switch · *.mshome.net sibling DNS</text>

  <!-- conductor VM -->
  <rect x="360" y="146" width="490" height="324" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="376" y="168" font-size="13.5" font-weight="700" fill="#1e40af">cc-conductor VM · the one scheduler</text>

  <rect x="385" y="180" width="200" height="80" rx="5" fill="#ffffff" stroke="#93c5fd"/>
  <text x="395" y="200" font-size="12.5" font-weight="600" fill="#1e293b">inbox/&lt;plan_id&gt;.md</text>
  <text x="395" y="217" font-size="11" fill="#475569">CCMETA {"builders": [...]}</text>
  <text x="395" y="233" font-size="11" fill="#475569">header + builder prompt body</text>

  <rect x="620" y="180" width="200" height="80" rx="5" fill="#ffffff" stroke="#93c5fd"/>
  <text x="630" y="200" font-size="12.5" font-weight="600" fill="#1e293b">plan_gen · plan_critic</text>
  <text x="630" y="217" font-size="12.5" font-weight="600" fill="#1e293b">auto_triage</text>
  <text x="630" y="234" font-size="11" fill="#475569">local `claude -p &lt;prompt&gt;`</text>

  <rect x="385" y="300" width="200" height="130" rx="5" fill="#ffffff" stroke="#93c5fd"/>
  <text x="395" y="320" font-size="12.5" font-weight="600" fill="#1e293b">conductor_maf.py</text>
  <text x="395" y="337" font-size="11" fill="#475569">scans inbox every ~3 s</text>
  <text x="395" y="353" font-size="11" fill="#475569">health-gates builders (ssh true)</text>
  <text x="395" y="369" font-size="11" fill="#475569">MAF fan-out ≥ 2 builders</text>
  <text x="395" y="389" font-size="11" font-style="italic" fill="#1e40af">SSH pipe = MCP transport →</text>
  <text x="395" y="404" font-size="11" font-style="italic" fill="#1e40af">every dispatch OTel-captured</text>
  <text x="395" y="419" font-size="11" font-style="italic" fill="#1e40af">by construction</text>

  <rect x="620" y="300" width="200" height="130" rx="5" fill="#ffffff" stroke="#93c5fd"/>
  <text x="630" y="320" font-size="12.5" font-weight="600" fill="#1e293b">runs/&lt;plan_id&gt;/result.json</text>
  <text x="630" y="337" font-size="11" fill="#475569">written after the assay grades</text>
  <text x="630" y="353" font-size="11" fill="#475569">(grades = passing tests,</text>
  <text x="630" y="369" font-size="11" fill="#475569">dynamic/behavior assay)</text>

  <!-- builder VM -->
  <rect x="360" y="520" width="490" height="340" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="376" y="542" font-size="13.5" font-weight="700" fill="#065f46">builder VM · cc-builder-N / claudefarm1</text>

  <rect x="385" y="558" width="200" height="140" rx="5" fill="#ffffff" stroke="#6ee7b7"/>
  <text x="395" y="578" font-size="12.5" font-weight="600" fill="#1e293b">worker-mcp-server.py</text>
  <text x="395" y="595" font-size="11" fill="#475569">run_plan · watch_progress</text>
  <text x="395" y="611" font-size="11" fill="#475569">check_claude_auth · get_run_log</text>
  <text x="395" y="631" font-size="11" font-style="italic" fill="#065f46">runner.json decides the agent</text>
  <text x="395" y="646" font-size="11" font-style="italic" fill="#065f46">(BUILDER_RUNNER overrides;</text>
  <text x="395" y="661" font-size="11" font-style="italic" fill="#065f46">absent → "claude")</text>

  <rect x="620" y="558" width="205" height="118" rx="5" fill="#ffffff" stroke="#6ee7b7"/>
  <text x="630" y="578" font-size="12.5" font-weight="600" fill="#1e293b">claude runner (frontier)</text>
  <text x="630" y="596" font-size="10.5" font-family="Consolas, monospace" fill="#334155">claude --model M</text>
  <text x="630" y="611" font-size="10.5" font-family="Consolas, monospace" fill="#334155">--dangerously-skip-permissions</text>
  <text x="630" y="626" font-size="10.5" font-family="Consolas, monospace" fill="#334155">-p &lt;plan&gt;</text>
  <text x="630" y="646" font-size="11" font-style="italic" fill="#475569">fresh single-shot process;</text>
  <text x="630" y="661" font-size="11" font-style="italic" fill="#475569">its world = plan + workdir</text>

  <rect x="620" y="700" width="205" height="90" rx="5" fill="#ffffff" stroke="#6ee7b7"/>
  <text x="630" y="720" font-size="12.5" font-weight="600" fill="#1e293b">openai runner (local)</text>
  <text x="630" y="738" font-size="10.5" font-family="Consolas, monospace" fill="#334155">agent_openai.py</text>
  <text x="630" y="753" font-size="10.5" font-family="Consolas, monospace" fill="#334155">--plan-file --workdir</text>
  <text x="630" y="772" font-size="11" font-style="italic" fill="#475569">OpenAI-compatible endpoint</text>

  <!-- ============ Anthropic API ============ -->
  <rect x="960" y="140" width="460" height="90" rx="8" fill="#f4f4f5" stroke="#71717a" stroke-width="1.4"/>
  <text x="976" y="164" font-size="13.5" font-weight="700" fill="#3f3f46">Anthropic API · frontier models</text>
  <text x="976" y="184" font-size="11.5" fill="#52525b">claude CLI in each VM authenticated once at provisioning;</text>
  <text x="976" y="200" font-size="11.5" fill="#52525b">check_claude_auth verifies the credential before dispatch</text>

  <!-- ============ AM4 ============ -->
  <rect x="960" y="520" width="460" height="310" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.6"/>
  <text x="976" y="544" font-size="14" font-weight="700" fill="#5b21b6">AM4 · Ubuntu · LAN 192.168.12.233</text>

  <rect x="990" y="565" width="190" height="105" rx="5" fill="#ffffff" stroke="#c4b5fd"/>
  <text x="1000" y="585" font-size="12.5" font-weight="600" fill="#1e293b">oxen facade :8090</text>
  <text x="1000" y="602" font-size="11" fill="#475569">dual Intel B70</text>
  <text x="1000" y="618" font-size="11" fill="#475569">Qwen3-30B (planner :8080)</text>
  <text x="1000" y="638" font-size="11" font-style="italic" fill="#5b21b6">woken by hearth wake_am4</text>

  <rect x="1210" y="565" width="180" height="105" rx="5" fill="#ffffff" stroke="#c4b5fd"/>
  <text x="1220" y="585" font-size="12.5" font-weight="600" fill="#1e293b">am4-worker-1 shell</text>
  <text x="1220" y="602" font-size="11" fill="#475569">same worker-mcp-server,</text>
  <text x="1220" y="618" font-size="11" fill="#475569">openai runner →</text>
  <text x="1220" y="634" font-size="11" fill="#475569">127.0.0.1:8090</text>

  <rect x="990" y="700" width="400" height="105" rx="5" fill="#ffffff" stroke="#c4b5fd"/>
  <text x="1000" y="720" font-size="12.5" font-weight="600" fill="#1e293b">⑥ cc-farmer reverse tunnel (return path)</text>
  <text x="1000" y="738" font-size="11" fill="#475569">conductor holds: ssh -R 127.0.0.1:2222 → claude@192.168.12.233</text>
  <text x="1000" y="754" font-size="11" fill="#475569">AM4 worker's "cc-farmer" alias = 127.0.0.1:2222 → conductor sshd</text>
  <text x="1000" y="774" font-size="11" font-style="italic" fill="#5b21b6">needed because NAT blocks inbound to the conductor VM —</text>
  <text x="1000" y="789" font-size="11" font-style="italic" fill="#5b21b6">git push results ride this, now over the LAN</text>

  <!-- ============ arrows ============ -->
  <!-- 1: intent -> HEARTH -->
  <line x1="160" y1="210" x2="160" y2="266" stroke="#475569" stroke-width="1.8" marker-end="url(#arr)"/>
  <circle cx="145" cy="238" r="10" fill="#1e293b"/><text x="145" y="242" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
  <text x="178" y="242" font-size="11" font-style="italic" fill="#64748b">MCP: submit_task</text>

  <!-- 1b: HEARTH -> inbox -->
  <polyline points="300,310 340,310 340,220 381,220" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="306" y="256" font-size="11" font-style="italic" fill="#64748b">SSH</text>

  <!-- planning loop -> inbox -->
  <line x1="620" y1="220" x2="589" y2="220" stroke="#475569" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- 2: inbox -> maf -->
  <line x1="485" y1="260" x2="485" y2="296" stroke="#475569" stroke-width="1.8" marker-end="url(#arr)"/>
  <circle cx="470" cy="278" r="10" fill="#1e293b"/><text x="470" y="282" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
  <text x="500" y="282" font-size="11" font-style="italic" fill="#64748b">scan ~3 s</text>

  <!-- 3: maf -> worker (dispatch) -->
  <line x1="440" y1="430" x2="440" y2="554" stroke="#475569" stroke-width="1.8" marker-end="url(#arr)"/>
  <circle cx="425" cy="492" r="10" fill="#1e293b"/><text x="425" y="496" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  <text x="372" y="512" font-size="11" font-style="italic" fill="#64748b">SSH-stdio MCP</text>

  <!-- 3b: maf -> am4-worker-1 -->
  <polyline points="520,430 520,505 1300,505 1300,561" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arr)"/>
  <circle cx="1000" cy="505" r="10" fill="#1e293b"/><text x="1000" y="509" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  <text x="1018" y="497" font-size="11" font-style="italic" fill="#64748b">SSH-stdio MCP · LAN</text>

  <!-- 4: worker -> runners -->
  <line x1="585" y1="600" x2="616" y2="600" stroke="#475569" stroke-width="1.8" marker-end="url(#arr)"/>
  <circle cx="602" cy="585" r="10" fill="#1e293b"/><text x="602" y="589" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
  <polyline points="585,672 602,672 602,745 616,745" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- runner -> API -->
  <polyline points="825,590 935,590 935,185 956,185" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="855" y="580" font-size="11" font-style="italic" fill="#64748b">HTTPS</text>

  <!-- openai runner -> oxen -->
  <polyline points="825,745 905,745 905,630 986,630" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="912" y="700" font-size="11" font-style="italic" fill="#64748b">LAN :8090</text>

  <!-- openai runner -> ollama -->
  <polyline points="700,790 700,815 304,815" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="480" y="808" font-size="11" font-style="italic" fill="#64748b">mshome :11434</text>

  <!-- am4-worker -> oxen -->
  <line x1="1210" y1="640" x2="1184" y2="640" stroke="#475569" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- am4-worker -> tunnel box -->
  <line x1="1300" y1="670" x2="1300" y2="696" stroke="#64748b" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrd)"/>

  <!-- 5: progress back (dashed) -->
  <line x1="540" y1="558" x2="540" y2="434" stroke="#64748b" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrd)"/>
  <circle cx="556" cy="492" r="10" fill="#1e293b"/><text x="556" y="496" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
  <text x="616" y="482" font-size="11" font-style="italic" fill="#64748b">progress files · QUESTION.md</text>
  <text x="616" y="496" font-size="11" font-style="italic" fill="#64748b">(watch_progress long-poll)</text>

  <!-- 6: git push results (dashed) -->
  <polyline points="585,690 604,690 604,445 660,445 660,434" fill="none" stroke="#64748b" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrd)"/>
  <circle cx="620" cy="460" r="10" fill="#1e293b"/><text x="620" y="464" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">6</text>
  <text x="636" y="464" font-size="11" font-style="italic" fill="#64748b">git push → farmer repo</text>

  <!-- legend -->
  <rect x="30" y="936" width="1390" height="48" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <line x1="52" y1="960" x2="92" y2="960" stroke="#475569" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="100" y="964" font-size="11.5" fill="#475569">dispatch (SSH / MCP / model call)</text>
  <line x1="330" y1="960" x2="370" y2="960" stroke="#64748b" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrd)"/>
  <text x="378" y="964" font-size="11.5" fill="#475569">return path (files, git, result)</text>
  <circle cx="590" cy="960" r="10" fill="#1e293b"/><text x="590" y="964" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">n</text>
  <text x="608" y="964" font-size="11.5" fill="#475569">sequence</text>
  <text x="700" y="964" font-size="11.5" font-style="italic" fill="#92400e">Nothing is pushed into a running Claude — each plan spawns a fresh headless `claude -p`.</text>
</svg>
