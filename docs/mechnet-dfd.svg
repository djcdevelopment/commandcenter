  <text x="74" y="292" font-size="11" fill="#475569">watchdog · patrol · drain</text>
  <text x="74" y="308" font-size="11" fill="#475569">probes every node (SSH/TCP),</text>
  <text x="74" y="324" font-size="11" fill="#475569">heals the obvious</text>
  <text x="74" y="342" font-size="11" font-style="italic" fill="#065f46">now gateway timers ✓ (ADR-0015)</text>

  <rect x="620" y="650" width="230" height="90" rx="14" fill="#fff8ef" stroke="#d97706" stroke-width="1.6"/>
