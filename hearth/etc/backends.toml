# ============================================================================
# HEARTH inference backend pool  —  "bankedfire" (Banked Fire, P1 + P2)
# ============================================================================
# Declarative pool for hearth.toolsurface.inference.local_generate.
#
# One config file, one scheduler (Banked Fire design principle #2): the router
# reads this, and later phases (watchdog P4) read the SAME declaration. Add a
# backend here and it is routable — no code change.
#
# Parsed with stdlib tomllib (Python 3.11+); no third-party deps by design.
# Override the path with the HEARTH_BACKENDS env var. If the file is absent the
# router falls back to a built-in omen-ollama default, so the gateway never
# breaks on a missing pool file.
#
# Routing policy (see backends.py select_backend), in order:
#   1. caller-pinned endpoint  -> unchanged legacy behavior, wins outright, no occupancy check
#   2. caller-pinned backend name -> wins outright, no occupancy check (a pin is deliberate)
#   3. tag match (task="research" -> a backend tagged "research"), occupancy-checked (P2):
#      a busy or unknown-occupancy candidate is skipped, next tag/candidate tried
#   4. fall back to `default` (never itself occupancy-gated)
# Occupancy probe: hearth.toolsurface.occupancy (SSH render-node check on AM4,
# 30s cache, fail-open to "unknown" -> busy for opportunistic/tag-routed calls).
# ============================================================================

# Name of the backend used when nothing else matches.
default = "omen-ollama"

[[backend]]
name     = "omen-ollama"
endpoint = "http://127.0.0.1:11434"
api      = "ollama"                          # /api/generate
models   = ["qwen3-coder:30b"]
tags     = ["default", "code"]
revive   = "start_ollama"                    # HEARTH summon tool (consumed in P4)

[[backend]]
name     = "am4-oxen"                          # the banked fire — dual-B70 Qwen3-30B
endpoint = "http://192.168.12.233:8090"       # AM4 over LAN (ufw 8090 ALLOW 192.168.12.0/24,
                                              # added 2026-07-09) — machine lanes stay off the
                                              # tailnet (ADR-0014)
api      = "openai"                           # /v1/chat/completions, Bearer auth
auth_env = "AM4_OXEN_TOKEN"                   # SAME name the fleet already uses
                                              # (conductor .env; ensemble_structure.py:71).
                                              # Copy that line into hearth/var/gateway.cmd
                                              # as `set AM4_OXEN_TOKEN=...` (batch fragment,
                                              # sourced by start-hearth-gateway.cmd).
models   = ["oxen"]                           # facade-advertised id (GET /v1/models);
                                              # dual-B70 Qwen3-30B behind the oxen alias.
                                              # (was "qwen3-30b" — not a real id → 404.)
tags     = ["big-context", "research", "second-opinion"]
revive   = "wake_am4"                          # LIVE HEARTH summon tool: idempotent
                                              # (facade backend.ok short-circuits),
                                              # imagegen-occupancy-gated, starts the
                                              # managed b70-planner --user unit.
# `conductor_worker`: metadata only — which conductor worker rides this backend
# (useful for humans cross-referencing fleet.json). The LIVE P2 occupancy probe
# does NOT read this field: it goes straight to AM4 serve-truth (render_owners
# over SSH — hearth.toolsurface.occupancy.check_occupancy, keyed by backend
# name "am4-oxen"), per the strategy doc's ground truth over conductor-FS demotion.
occupancy = { conductor_worker = "am4-worker-1" }
