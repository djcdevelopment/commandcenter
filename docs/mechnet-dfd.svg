  <text x="76" y="924" font-size="11.5" fill="#475569">Channels: MCP over streamable-HTTP (operator → P1) · SSH-stdio MCP (P2 → P3, OTel-captured by transport) · plain key SSH (P1 → conductor files; P6 probes; P7 scores) ·</text>
