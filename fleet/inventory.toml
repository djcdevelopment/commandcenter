# ============================================================================
# Fleet reachability inventory -- canonical, OMEN-side.
# ============================================================================
# THE source of truth for HOW to reach every node on the fleet network.
#
# Why it lives here (OMEN / C:\work\commandcenter) and not on the conductor:
# OMEN is the durable host (the Hyper-V hypervisor, always up). The conductor is
# rebuildable and can be down -- exactly when you MOST need to know what's reachable.
# OMEN is also the best vantage point: it can see the tailnet (100.x via Tailscale)
# AND its own Hyper-V VM siblings (mshome.net / 172.x) at the same time.
#
# Relationship to the conductor's fleet.json:
#   - fleet.json  = the conductor's auto-maintained BUILD-POOL view (which nodes are
#     workers/assay, mcp_ready, excluded). It churns as builds run.
#   - this file   = the stable REACHABILITY superset (addresses, how-to-reach, which
#     services should answer on which ports). It changes rarely.
# Different jobs. Don't fold one into the other.
#
# Consumed by: fleet/fleet_ping.py (health sweep CLI) and hearth/scheduler
# (builder locality, see below). Parsed with stdlib tomllib (Python 3.11+); no
# PyYAML dependency by design (repo is stdlib-only).
#
# `runner_class` (optional, per builder node): "local" | "frontier" — which token
# economy the node's build runner spends (2026-07-11). This is the OMEN-reachable
# projection of each node's ~/fleet-worker-node/runner.json (openai -> a local
# backend = "local"; no runner.json -> the worker defaults to the metered claude
# runner = "frontier"). hearth/scheduler derives machine kinds and the hindsight
# regret assay's local-vs-metered classification from it — keep it in sync when a
# node's runner.json changes.
#
# Addressing model (Derek, 2026-07-02): VMs never join the tailnet -- only physical
# hosts hold tailnet identities. Same-host VMs are reached via mshome.net sibling DNS;
# off-host VMs via a ProxyJump through their tailnet-member hypervisor.
#
# Addressing model v2 (Derek, 2026-07-09, ADR-0014): MACHINE lanes never ride the
# tailnet at all. HEARTH/mechnet machine-to-machine traffic uses mshome.net (VMs)
# or the home LAN 192.168.12.0/24 (physical AM4). Tailscale remains only for
# HUMAN/roaming access (phone, i5) and the AM4 gallery Funnel — never in the
# control loop. Trigger: Tailscale SSH "check" mode blocked the conductor lane
# pending a browser re-auth (2026-07-09).
# ============================================================================

[meta]
tailnet = "tail8e749c.ts.net"
hyperv_host = "omen"
updated = "2026-07-11"
ssh_user = "claude"          # default ssh user for reachability/health probes

# --- Physical hosts (tailnet members) ---------------------------------------

[[node]]
name = "omen"
kind = "physical-host"
address = "omen.mshome.net"
alt = ["100.124.12.37"]   # tailnet identity stays (i5/phone reach it from another project)
via = "mshome"
expect = "up"
purpose = "Hyper-V hypervisor + Ollama backend (:11434) + HEARTH gateway (:8710). Hosts all builder VMs. THIS box."
# `revive` (optional, per-check): a shell command the watchdog runs when this
# service is down on an expect="up" node. Since ADR-0015 the watchdog is an
# in-gateway daemon timer (the old mechnet-watchdog scheduled task is deregistered).
# The gateway revive is the proven doorcheck --revive (verified 2026-07-04, 322ab7d).
checks = [
  { service = "ollama", port = 11434, host = "omen.mshome.net" },
  { service = "hearth-gateway", port = 8710, host = "127.0.0.1", revive = "C:\\work\\commandcenter\\fleet-worker-node\\.venv-omen\\Scripts\\python.exe -m hearth.callers.doorcheck --revive" },
]

[[node]]
name = "cc-conductor"
kind = "physical-host"
address = "cc-conductor.mshome.net"
# tailnet identity REMOVED 2026-07-09 (post-ADR-0014 cleanup): node no longer appears in
# `tailscale status` — the old alts 100.74.110.91 / cc-conductor.tail8e749c.ts.net are dead.
via = "mshome"
expect = "up"
purpose = "Fleet orchestration engine: conductor daemon + api/dashboard (:8080)."
checks = [
  { service = "ssh", port = 22 },
  { service = "dashboard", port = 8080 },
]

[[node]]
name = "am4"
kind = "physical-host"
address = "192.168.12.233"
alt = ["100.116.82.60", "am4.tail8e749c.ts.net"]   # tailscale STAYS on AM4 (gallery Funnel +
   # phone/i5 access) — but HEARTH/mechnet lanes use the LAN address (ADR-0014).
   # ufw: 22 + 8090 ALLOW from 192.168.12.0/24 (8090 rule added 2026-07-09).
via = "lan"
expect = "up"
purpose = "AM4 inference + observability (OTel/Jaeger :16686). Local-model host. NOT a build VM."
checks = [
  { service = "ssh", port = 22 },
  { service = "jaeger", port = 16686 },
]

[[node]]
name = "i5-laptop"
kind = "physical-host"
address = "100.125.141.110"
alt = ["i5-laptop.tail8e749c.ts.net"]
via = "tailnet"
expect = "optional"
purpose = "Portable demo/edge node. Normally offline -- not part of the SPINE baseline."
checks = [
  { service = "ssh", port = 22 },
]

# --- OMEN Hyper-V VMs (mshome.net siblings) ---------------------------------

[[node]]
name = "claudefarm1"
kind = "vm"
address = "claudefarm1.mshome.net"
via = "mshome"
host = "omen"
expect = "up"
runner_class = "local"   # runner.json: openai -> OMEN Ollama
purpose = "Original golden-image VM. Worker + (temp) assay shell; hosts the omen-worker-1 builder."
note = "2026-07-04 RECOVERED. Root cause was a MAC-ADDRESS COLLISION: cc-builder-4 was stood up (2026-07-03) with a static MAC identical to this VM's golden-image MAC (both 00155D0CC700). Two VMs, same static MAC on the Default Switch -> cc-builder-4 won, claudefarm1 was knocked off the network (no lease, unreachable). Its Hyper-V DISPLAY name had also been changed to 'cc-worker-1' (guest hostname stayed 'claudefarm1'), which hid it. Fix: Stop-VM, Set-VMNetworkAdapter -StaticMacAddress 00155D0CC70A (unique), Start-VM -> got fresh lease 172.21.189.98, mshome DNS updated, sshd up, conductor reachable, omen-worker-1 UP. hv-kvp-daemon is inactive in the guest (cosmetic: host can't read guest IP via KVP, but reachability is fine). NOTE: cc-builder-4 still holds the original golden MAC 00155D0CC700 - future clones off the golden image must regenerate their MAC (see [[project-fleet-vm-provisioning]])."
checks = [
  { service = "ssh", port = 22 },
]

[[node]]
name = "cc-builder-1"
kind = "vm"
address = "cc-builder-1.mshome.net"
via = "mshome"
host = "omen"
expect = "up"
runner_class = "frontier"   # no runner.json on the node -> worker defaults to the metered claude runner
purpose = "Frontier builder VM (claude/sonnet runner)."
checks = [
  { service = "ssh", port = 22 },
]

[[node]]
name = "cc-builder-2"
kind = "vm"
address = "cc-builder-2.mshome.net"
via = "mshome"
host = "omen"
expect = "up"
runner_class = "local"   # runner.json: openai -> AM4 vllama-planner
purpose = "Builder VM (local oxen-planner runner)."
checks = [
  { service = "ssh", port = 22 },
]

[[node]]
name = "cc-builder-3"
kind = "vm"
address = "cc-builder-3.mshome.net"
via = "mshome"
host = "omen"
expect = "up"
runner_class = "local"   # runner.json: openai -> OMEN Ollama qwen2.5:14b
purpose = "Builder + assay VM (rebuilt 2026-07-01, standalone disk). Current assay node while claudefarm1 is down."
checks = [
  { service = "ssh", port = 22 },
]

[[node]]
name = "cc-builder-4"
kind = "vm"
address = "cc-builder-4.mshome.net"
via = "mshome"
host = "omen"
expect = "optional"
runner_class = "local"   # runner.json: openai -> OMEN Ollama mixtral 8x22b
purpose = "OMEN-local Ollama MoE critic (mixtral 8x22b q2_K). exploratory-perspective only; excluded from default build pool."
note = "2026-07-09: address moved off the drift-prone NAT IP to sibling DNS (verified reachable). Found ON the tailnet (policy violation, 'Duplicate node key' badge, ts 1.98.8 = fresh install — likely a reachability workaround for the drifted NAT IP) -> removed from tailnet via admin console per VMs-never-join policy + ADR-0014. tailscaled may still run in-guest (claude has no passwordless sudo to disable it) but is inert once the node is deleted server-side."
checks = [
  { service = "ssh", port = 22 },
]

# --- Logical builders (a runner riding another node's shell) ----------------
# These are not machines of their own -- they run a worker shell on `rides_on`
# and point at a separate model backend. Reachability = can we reach the shell host?

[[node]]
name = "am4-worker-1"
kind = "logical-builder"
rides_on = "am4"
model_backend = "127.0.0.1:8090"   # oxen (dual B70 Qwen3-30B), local to AM4
via = "lan"
expect = "up"
runner_class = "local"   # openai runner -> oxen (dual B70), AM4-local
purpose = "AM4 local-model builder: openai runner -> oxen. Shell on AM4; farmer via cc-farmer tunnel."
checks = [
  { service = "ssh", port = 22, host = "192.168.12.233" },
]

[[node]]
name = "omen-worker-1"
kind = "logical-builder"
rides_on = "claudefarm1"
model_backend = "omen.mshome.net:11434"   # Ollama qwen3-coder:30b, on OMEN
via = "mshome"
expect = "up"
runner_class = "local"   # openai runner -> OMEN Ollama qwen3-coder:30b
purpose = "OMEN Ollama qwen3-coder:30b builder (54.6 tok/s). Shell rides claudefarm1 -- so it dies when claudefarm1 is down, even though its model backend (OMEN) is fine."
note = "Coupling to claudefarm1 is a fragility: OMEN's Ollama is reachable independently. Candidate to re-home its shell off claudefarm1 (see CONDUCTOR-FOLLOWUPS)."
checks = [
  { service = "ssh", port = 22, host = "claudefarm1.mshome.net" },
  { service = "ollama", port = 11434, host = "omen.mshome.net" },
]
